<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KET冲刺小站 🌟</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 16px 0;
      color: #aaa;
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      background: #fff;
      color: #333;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: box-shadow 0.2s, border-color 0.2s;
      box-sizing: border-box;
      text-decoration: none;
    }
    .google-btn:hover {
      box-shadow: 0 2px 8px rgba(66,133,244,0.18);
      border-color: #4285f4;
    }
    .google-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
  </style>
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="logo">
      <div class="logo-icon">🦄</div>
      <h1>KET冲刺小站</h1>
      <p>一起备考，轻松拿证！</p>
    </div>

    <!-- 自定义 Google 登录按钮（不依赖 SDK 渲染） -->
    <button class="google-btn" id="googleLoginBtn" onclick="loginWithGoogle()">
      <svg viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      使用 Google 账号登录
    </button>

    <div class="divider">或使用账号密码</div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">登录</button>
      <button class="tab" onclick="switchTab('register')">注册</button>
    </div>
    <form id="loginForm" class="auth-form">
      <div class="input-group">
        <span class="input-icon">👤</span>
        <input type="text" id="loginUser" placeholder="用户名" required>
      </div>
      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input type="password" id="loginPass" placeholder="密码" required>
      </div>
      <button type="submit" class="btn-primary">出发！🚀</button>
    </form>
    <form id="registerForm" class="auth-form hidden">
      <div class="input-group">
        <span class="input-icon">👤</span>
        <input type="text" id="regUser" placeholder="起个用户名" required>
      </div>
      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input type="password" id="regPass" placeholder="设置密码" required>
      </div>
      <button type="submit" class="btn-primary">加入！🎉</button>
    </form>
    <div id="authMsg" class="msg"></div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
