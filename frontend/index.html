<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KET冲刺小站 🌟</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Google SDK 加载完成后调用 initGoogle -->
  <script src="https://accounts.google.com/gsi/client" onload="initGoogle()" async defer></script>
  <style>
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 16px 0;
      color: #aaa;
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }
    #googleBtnWrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 4px;
      min-height: 44px;
    }
  </style>
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="logo">
      <div class="logo-icon">🦄</div>
      <h1>KET冲刺小站</h1>
      <p>一起备考，轻松拿证！</p>
    </div>

    <!-- Google 官方登录按钮渲染容器 -->
    <div id="googleBtnWrapper"></div>

    <div class="divider">或使用账号密码</div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">登录</button>
      <button class="tab" onclick="switchTab('register')">注册</button>
    </div>
    <form id="loginForm" class="auth-form">
      <div class="input-group">
        <span class="input-icon">👤</span>
        <input type="text" id="loginUser" placeholder="用户名" required>
      </div>
      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input type="password" id="loginPass" placeholder="密码" required>
      </div>
      <button type="submit" class="btn-primary">出发！🚀</button>
    </form>
    <form id="registerForm" class="auth-form hidden">
      <div class="input-group">
        <span class="input-icon">👤</span>
        <input type="text" id="regUser" placeholder="起个用户名" required>
      </div>
      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input type="password" id="regPass" placeholder="设置密码" required>
      </div>
      <button type="submit" class="btn-primary">加入！🎉</button>
    </form>
    <div id="authMsg" class="msg"></div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
