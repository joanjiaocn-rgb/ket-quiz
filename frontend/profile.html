<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile 👤</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .profile-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
    }
    .profile-header {
      display: flex;
      gap: 24px;
      padding: 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 16px;
      color: white;
      margin-bottom: 24px;
    }
    .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .profile-info {
      flex: 1;
    }
    .profile-info h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    .profile-info p {
      margin: 4px 0;
      opacity: 0.9;
    }
    .profile-level {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.2);
      padding: 6px 14px;
      border-radius: 20px;
      margin-top: 12px;
    }
    .profile-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
    }
    .profile-section {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .profile-section h2 {
      margin: 0 0 16px;
      font-size: 18px;
      color: #333;
    }
    .stats-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .stat-card {
      background: #f8f9fa;
      padding: 16px;
      border-radius: 10px;
      text-align: center;
    }
    .stat-card .number {
      font-size: 28px;
      font-weight: 700;
      color: #667eea;
    }
    .stat-card .label {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }
    .achievement-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .achievement-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 10px;
    }
    .achievement-item.locked {
      opacity: 0.5;
      filter: grayscale(1);
    }
    .achievement-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .achievement-info h4 {
      margin: 0 0 4px;
      font-size: 14px;
    }
    .achievement-info p {
      margin: 0;
      font-size: 12px;
      color: #666;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #333;
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      width: 100%;
    }
    .btn-primary:hover {
      opacity: 0.9;
    }
    .nav-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 1px solid #e0e0e0;
      padding-bottom: 12px;
    }
    .nav-tab {
      padding: 8px 16px;
      border: none;
      background: none;
      cursor: pointer;
      border-radius: 8px;
      font-size: 14px;
      color: #666;
    }
    .nav-tab:hover {
      background: #f0f0f0;
    }
    .nav-tab.active {
      background: #667eea;
      color: white;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    /* 套餐信息样式 */
    .subscription-section {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      border: 2px solid transparent;
      transition: all 0.3s ease;
    }
    .subscription-section.pro {
      background: linear-gradient(135deg, #fff5f9 0%, #ede9fe 100%);
      border-color: #FF6B9D;
    }
    .subscription-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .subscription-info {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .subscription-badge {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      background: #e9ecef;
      color: #666;
    }
    .subscription-badge.pro {
      background: linear-gradient(135deg, #FF6B9D, #A78BFA);
      color: white;
    }
    .subscription-name {
      font-size: 15px;
      color: #333;
      font-weight: 600;
    }
    .btn-upgrade {
      background: linear-gradient(135deg, #FF6B9D, #A78BFA);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-upgrade:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255,107,157,0.35);
    }
    .subscription-details {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e0e0e0;
    }
    .detail-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }
    .detail-item .label {
      color: #666;
      font-size: 14px;
    }
    .detail-item .value {
      color: #333;
      font-weight: 600;
      font-size: 14px;
    }
    @media (max-width: 768px) {
      .profile-grid {
        grid-template-columns: 1fr;
      }
      .profile-header {
        flex-direction: column;
        text-align: center;
      }
      .stats-cards, .achievement-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="dashboard-page">
  <header class="top-bar">
    <div class="top-bar-left">
      <button class="btn-sm" onclick="location.href='dashboard.html'">← Back to Learning Center</button>
    </div>
    <div class="top-bar-right">
      <span id="welcomeUser">👤</span>
      <button class="btn-sm" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="profile-container">
    <!-- 头部信息 -->
    <div class="profile-header" id="profileHeader">
      <div class="profile-avatar" id="profileAvatar">🦄</div>
      <div class="profile-info">
        <h1 id="profileName">Loading...</h1>
        <p id="profileBio"></p>
        <div class="profile-level">
          <span>Level <span id="profileLevel">1</span></span>
          <span>·</span>
          <span id="profilePoints">0</span> Points
        </div>
      </div>
    </div>

    <!-- Subscription Info -->
    <div class="profile-section subscription-section" id="subscriptionSection" style="margin-bottom: 24px;">
      <div class="subscription-header">
        <div class="subscription-info">
          <span class="subscription-badge" id="subscriptionBadge">Free</span>
          <span class="subscription-name" id="subscriptionName"></span>
        </div>
        <button class="btn-upgrade" id="upgradeBtn" onclick="location.href='pricing.html'">Upgrade Plan</button>
      </div>
      <div class="subscription-details" id="subscriptionDetails" style="display: none;">
        <div class="detail-item">
          <span class="label">Expires on</span>
          <span class="value" id="expireDate">-</span>
        </div>
      </div>
    </div>

    <!-- 主要内容区 -->
    <div class="profile-grid">
      <!-- 左侧 - 学习统计和成就 -->
      <div>
        <div class="profile-section">
          <h2>📊 Learning Stats</h2>
          <div class="stats-cards" id="statsCards">
            <div class="stat-card">
              <div class="number">-</div>
              <div class="label">Total Questions</div>
            </div>
            <div class="stat-card">
              <div class="number">-</div>
              <div class="label">Accuracy</div>
            </div>
            <div class="stat-card">
              <div class="number">-</div>
              <div class="label">Practice Sessions</div>
            </div>
            <div class="stat-card">
              <div class="number">-</div>
              <div class="label">Study Streak</div>
            </div>
          </div>
        </div>

        <div class="profile-section" style="margin-top: 24px;">
          <h2>🏆 Achievements</h2>
          <div class="achievement-list" id="achievementList">
            <div class="loading">Loading...</div>
          </div>
        </div>
      </div>

      <!-- 右侧 - 个人资料和设置 -->
      <div>
        <div class="nav-tabs">
          <button class="nav-tab active" onclick="switchTab('profile')">Profile</button>
          <button class="nav-tab" onclick="switchTab('settings')">Settings</button>
        </div>

        <!-- Profile Edit -->
        <div class="tab-content active" id="tab-profile">
          <div class="profile-section">
            <h2>✏️ Edit Profile</h2>
            <form id="profileForm">
              <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="displayName" placeholder="Name shown to others">
              </div>
              <div class="form-group">
                <label>Bio</label>
                <textarea id="bio" placeholder="Tell us about yourself..."></textarea>
              </div>
              <div class="form-group">
                <label>Study Goal</label>
                <select id="studyGoal">
                  <option value="">Select...</option>
                  <option value="pass">Pass KET Exam</option>
                  <option value="improve">Improve English</option>
                  <option value="fun">For Fun</option>
                </select>
              </div>
              <div class="form-group">
                <label>Target Score</label>
                <input type="number" id="targetScore" placeholder="e.g. 120" min="0" max="150">
              </div>
              <button type="submit" class="btn-primary">Save Changes</button>
            </form>
          </div>
        </div>

        <!-- Settings -->
        <div class="tab-content" id="tab-settings">
          <div class="profile-section">
            <h2>⚙️ Preferences</h2>
            <form id="settingsForm">
              <div class="form-group">
                <label>
                  <input type="checkbox" id="notificationsEnabled"> Enable Notifications
                </label>
              </div>
              <div class="form-group">
                <label>
                  <input type="checkbox" id="soundEnabled"> Enable Sound
                </label>
              </div>
              <div class="form-group">
                <label>
                  <input type="checkbox" id="autoPlayAudio"> Auto-play Listening Audio
                </label>
              </div>
              <div class="form-group">
                <label>Theme</label>
                <select id="theme">
                  <option value="light">Light</option>
                  <option value="dark">Dark</option>
                </select>
              </div>
              <div class="form-group">
                <label>Language</label>
                <select id="language">
                  <option value="en">English</option>
                  <option value="zh-CN">中文</option>
                </select>
              </div>
              <button type="submit" class="btn-primary">Save Settings</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/profile.js"></script>
</body>
</html>
